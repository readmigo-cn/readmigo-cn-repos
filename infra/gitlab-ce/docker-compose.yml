# 极狐 GitLab CE 自部署 — 灾备托管节点
#
# 用途: 作为 Gitee 企业版（主托管）的灾备镜像，满足国内数据本地化合规要求。
# 镜像: 极狐 GitLab CE 17.x (gitlab-jh)，极狐（GitLab 中国发行版）官方镜像，
#       服务器位于中国大陆，无需访问 gitlab.com。
#
# 硬件最低要求:
#   RAM  >= 4 GB (推荐 8 GB，Sidekiq + Puma 各吃 1-2 GB)
#   Disk >= 50 GB (代码仓库 + 备份，推荐 100 GB SSD)
#   CPU  >= 2 vCPU (推荐 4+ vCPU)
#
# 使用前必读:
#   1. 复制 .env.example 为 .env，填写所有 <PLACEHOLDER> 值
#   2. 配置 DNS: gitlab.readmigo.cn → 本机公网 IP
#   3. 首次启动后运行 'make init-ssl' 申请 Let's Encrypt 证书
#   4. 详细操作见 README.md

version: "3.9"

services:
  gitlab:
    # 极狐 GitLab CE 官方镜像
    # 镜像地址: https://registry.gitlab.cn/omnibus/gitlab-jh
    # 版本锁定到 17.x 大版本，避免自动升级引入 breaking changes
    # 建议定期检查: https://gitlab.cn/blog 查看版本公告
    image: registry.gitlab.cn/omnibus/gitlab-jh:17.11.1-jh.0
    container_name: gitlab-ce

    restart: unless-stopped

    # ─── 端口映射 ──────────────────────────────────────────────
    # 若服务器已有其他服务占用 80/443/22，可修改宿主机端口
    # 例: "8080:80" — 但 external_url 中的端口也需对应修改
    ports:
      - "80:80"    # HTTP (会被 Let's Encrypt ACME challenge 用到)
      - "443:443"  # HTTPS
      - "2222:22"  # SSH git push (宿主机 22 通常被 sshd 占用，故映射到 2222)

    # ─── 数据持久化 ────────────────────────────────────────────
    # 全部挂载到宿主机 ./data/ 下，方便备份和迁移
    volumes:
      - ./data/config:/etc/gitlab          # gitlab.rb 及证书配置
      - ./data/logs:/var/log/gitlab        # 运行日志
      - ./data/data:/var/opt/gitlab        # 仓库数据、数据库、artifacts

    # ─── Omnibus 配置 (等价于 /etc/gitlab/gitlab.rb) ──────────
    environment:
      GITLAB_OMNIBUS_CONFIG: |

        # ── 访问地址 ──────────────────────────────────────────
        # DNS 必须提前解析到本机 IP，SSL 证书才能自动签发
        # Let's Encrypt: 需要 80/443 对外可达
        # 若使用阿里云 SSL 证书，改为 nginx['ssl_certificate'] 手动配置
        external_url 'https://gitlab.readmigo.cn'

        # ── SSH 端口 (与 ports 中 2222:22 对应) ──────────────
        gitlab_rails['gitlab_shell_ssh_port'] = 2222

        # ── Let's Encrypt 自动证书 ────────────────────────────
        # 首次申请需确保 80 端口可访问 ACME challenge
        letsencrypt['enable'] = true
        letsencrypt['contact_emails'] = ['devops@readmigo.cn']
        # 每月 1 日凌晨 2:30 自动续期
        letsencrypt['auto_renew_hour'] = "2"
        letsencrypt['auto_renew_minute'] = "30"
        letsencrypt['auto_renew_day_of_month'] = "1"

        # ── SMTP 邮件 (以腾讯企业邮箱为例) ───────────────────
        # 若使用阿里云邮件推送，host 改为 smtpdm.aliyun.com，port 465
        # 生产环境密码通过 docker secret 或外部 .env 注入，不要硬编码
        gitlab_rails['smtp_enable'] = true
        gitlab_rails['smtp_address'] = "smtp.exmail.qq.com"
        gitlab_rails['smtp_port'] = 465
        gitlab_rails['smtp_user_name'] = "gitlab-noreply@readmigo.cn"  # <PLACEHOLDER>
        gitlab_rails['smtp_password'] = ENV['GITLAB_SMTP_PASSWORD']     # 从环境变量读取
        gitlab_rails['smtp_domain'] = "readmigo.cn"
        gitlab_rails['smtp_authentication'] = "login"
        gitlab_rails['smtp_enable_starttls_auto'] = false
        gitlab_rails['smtp_tls'] = true
        gitlab_rails['gitlab_email_from'] = 'gitlab-noreply@readmigo.cn'
        gitlab_rails['gitlab_email_reply_to'] = 'devops@readmigo.cn'

        # ── 备份配置 (华为云 OBS，兼容 S3 协议) ──────────────
        # OBS Bucket 须提前创建，并开启版本控制
        # 密钥通过宿主机环境变量传入，不写入此文件
        gitlab_rails['backup_upload_connection'] = {
          'provider' => 'AWS',
          'region' => 'cn-north-4',              # 华为云北京四区域
          'aws_access_key_id' => ENV['OBS_ACCESS_KEY'],
          'aws_secret_access_key' => ENV['OBS_SECRET_KEY'],
          'endpoint' => 'https://obs.cn-north-4.myhuaweicloud.com',
          'path_style' => true
        }
        gitlab_rails['backup_upload_remote_directory'] = 'readmigo-gitlab-backup'  # <PLACEHOLDER: OBS bucket name>
        # 本地仅保留最近 7 天备份，旧备份由 OBS 生命周期策略管理
        gitlab_rails['backup_keep_time'] = 604800   # 7 days in seconds

        # ── 安全：关闭公开注册 ────────────────────────────────
        # 灾备节点不对外开放，只允许管理员创建账号
        gitlab_rails['gitlab_signup_enabled'] = false

        # ── Container Registry (默认关闭，节省磁盘和内存) ────
        # 灾备用途不需要 Registry；如需启用，取消下面注释
        # registry_external_url 'https://registry.gitlab.readmigo.cn'
        # registry['enable'] = true
        registry['enable'] = false

        # ── 性能调优 (针对 8C16G 服务器) ─────────────────────
        # Puma worker 数 = CPU 核数，最大不超过 RAM/1.5GB
        puma['worker_processes'] = 4
        # Sidekiq 并发数，影响后台任务速度
        sidekiq['concurrency'] = 10

        # ── 时区 ──────────────────────────────────────────────
        gitlab_rails['time_zone'] = 'Asia/Shanghai'

    # ─── 健康检查 ──────────────────────────────────────────────
    # GitLab 启动较慢 (约 3-5 分钟)，start_period 给足时间
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s   # 5 分钟启动宽限期

    # ─── 环境变量文件 ──────────────────────────────────────────
    # 敏感信息（SMTP 密码、OBS 密钥）从 .env 文件读入，不写入 docker-compose.yml
    # .env 已添加到 .gitignore，禁止提交到代码仓库
    env_file:
      - .env

    # ─── 系统限制 (shm_size 防止 PostgreSQL 共享内存不足) ─────
    shm_size: '256m'

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
