# .gitee/workflows/build.yml
# server-cn 已拆分到独立 repo gitee.com/readmigo/server-cn
# 这里只保留 llm-adapter / harmony-app 的 placeholder build job
# server-cn 的 Docker build 移到 server-cn 仓的 .gitee/workflows/

name: Build artifacts

on:
  push:
    branches:
      - main
    paths:
      - "packages/llm-adapter/**"
      - "apps/harmony-app/**"
  workflow_dispatch:

jobs:
  build-llm-adapter:
    name: Build / llm-adapter
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'packages/llm-adapter')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @readmigo-cn/llm-adapter build
      - uses: actions/upload-artifact@v4
        with:
          name: llm-adapter-dist
          path: packages/llm-adapter/dist/

  build-hap-placeholder:
    name: Build HAP (placeholder)
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "TODO: HAP build requires DevEco Studio CLI on self-hosted runner"
