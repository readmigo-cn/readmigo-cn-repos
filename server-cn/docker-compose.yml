version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: readmigo_cn_postgres
    environment:
      POSTGRES_USER: readmigo
      POSTGRES_PASSWORD: readmigo
      POSTGRES_DB: readmigo_cn
    ports:
      - '5432:5432'
    volumes:
      - readmigo_cn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U readmigo -d readmigo_cn']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: readmigo_cn_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: readmigo_cn_adminer
    depends_on:
      - postgres
    ports:
      - '8080:8080'

volumes:
  readmigo_cn_pgdata:
